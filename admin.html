<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Meu Bolão</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .tab { padding: 8px 16px; background: #e0e0e0; border-radius: 30px; cursor: pointer; }
        .tab.ativo { background: #667eea; color: white; }
        .conteudo { display: none; }
        .conteudo.ativo { display: block; }
        .card { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .jogo-item {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        .jogo-item input { padding: 8px; border: 2px solid #ddd; border-radius: 8px; flex: 1; }
        button { padding: 8px 16px; border: none; border-radius: 30px; cursor: pointer; margin: 3px; background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; }
        .btn-warning { background: #f39c12; }
        .login-area { max-width: 300px; margin: 50px auto; text-align: center; }
        .login-area input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 30px; border: 2px solid #ddd; }
        .error { color: red; margin-top: 10px; }
        @media (max-width: 600px) { .jogo-item { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Painel Administrador</h1>
        
        <!-- TELA DE LOGIN -->
        <div id="login-area" class="login-area">
            <h2>🔐 Acesso Restrito</h2>
            <input type="password" id="senha" placeholder="Digite a senha">
            <button onclick="verificarSenha()">Entrar</button>
            <div id="erro-senha" class="error"></div>
        </div>
        
        <!-- CONTEÚDO ADMIN (oculto até login) -->
        <div id="conteudo-admin" style="display: none;">
            <div style="display: flex; justify-content: space-between;">
                <h1>⚽ Admin</h1>
                <button onclick="logoutAdmin()" class="btn-danger">Sair</button>
            </div>
            
            <div class="tabs">
                <span class="tab ativo" onclick="mudarAba('jogos')">📅 Jogos</span>
                <span class="tab" onclick="mudarAba('resultados')">🎯 Resultados</span>
                <span class="tab" onclick="mudarAba('pagamentos')">💰 Pagamentos</span>
                <span class="tab" onclick="mudarAba('config')">⚙️ Config</span>
            </div>
            
            <!-- ABA JOGOS -->
            <div id="aba-jogos" class="conteudo ativo">
                <div class="card">
                    <button onclick="adicionarJogo()">+ Adicionar Jogo</button>
                    <button onclick="salvarJogos()">💾 Salvar Jogos</button>
                    <div id="jogos-lista"></div>
                    <label>⏰ Prazo:</label>
                    <input type="datetime-local" id="prazo" style="margin-top: 10px;">
                </div>
            </div>
            
            <!-- ABA RESULTADOS -->
            <div id="aba-resultados" class="conteudo">
                <div class="card">
                    <div id="resultados-lista"></div>
                    <button onclick="salvarResultados()">💾 Salvar Resultados</button>
                </div>
            </div>
            
            <!-- ABA PAGAMENTOS -->
            <div id="aba-pagamentos" class="conteudo">
                <div class="card">
                    <div id="pagamentos-lista"></div>
                </div>
            </div>
            
            <!-- ABA CONFIG -->
            <div id="aba-config" class="conteudo">
                <div class="card">
                    <label>🎯 Pontos placar exato:</label>
                    <input type="number" id="pontos-placar" value="3">
                    <label>✅ Pontos resultado certo:</label>
                    <input type="number" id="pontos-resultado" value="1">
                    <label>💰 Valor da aposta (R$):</label>
                    <input type="number" id="valor-aposta" value="10">
                    <label>🔐 Nova senha:</label>
                    <input type="password" id="nova-senha" placeholder="Deixe em branco">
                    <button onclick="salvarConfig()">💾 Salvar</button>
                </div>
            </div>
            
            <p><a href="index.html" target="_blank">👥 Ver site do jogador</a></p>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDNtc50Dxym-ZL9QW7q9V9yLrYezijq0ek",
            authDomain: "meu-bolao-79771.firebaseapp.com",
            databaseURL: "https://meu-bolao-79771-default-rtdb.firebaseio.com",
            projectId: "meu-bolao-79771",
            storageBucket: "meu-bolao-79771.firebasestorage.app",
            messagingSenderId: "766522730401",
            appId: "1:766522730401:web:c056a8dedc130e6a5b0de0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let jogos = [];
        let participantes = [];
        let senhaAdmin = "admin123";
        
        // Carregar senha
        db.ref('config/senha').on('value', (snap) => { if (snap.val()) senhaAdmin = snap.val(); });
        
        // Carregar jogos
        db.ref('jogos').on('value', (snap) => {
            const data = snap.val();
            jogos = data ? Object.values(data) : [];
            console.log("📋 Jogos carregados:", jogos);
            mostrarJogos();
            mostrarResultados();
        });
        
        // Carregar participantes
        db.ref('participantes').on('value', (snap) => {
            participantes = snap.val() ? Object.values(snap.val()) : [];
            mostrarPagamentos();
        });
        
        db.ref('prazo').on('value', (snap) => {
            document.getElementById('prazo').value = snap.val() || '2026-04-08T18:55';
        });
        
        // ========== LOGIN ==========
        function verificarSenha() {
            if (document.getElementById('senha').value === senhaAdmin) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('conteudo-admin').style.display = 'block';
                sessionStorage.setItem('adminLogado', 'true');
            } else {
                document.getElementById('erro-senha').textContent = 'Senha incorreta!';
            }
        }
        
        function logoutAdmin() {
            sessionStorage.removeItem('adminLogado');
            document.getElementById('login-area').style.display = 'block';
            document.getElementById('conteudo-admin').style.display = 'none';
        }
        
        if (sessionStorage.getItem('adminLogado') === 'true') {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('conteudo-admin').style.display = 'block';
        }
        
        function mudarAba(aba) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
            document.querySelectorAll('.conteudo').forEach(c => c.classList.remove('ativo'));
            event.target.classList.add('ativo');
            document.getElementById(`aba-${aba}`).classList.add('ativo');
            if (aba === 'pagamentos') mostrarPagamentos();
            if (aba === 'resultados') mostrarResultados();
        }
        
        // ========== GERENCIAR JOGOS ==========
        function mostrarJogos() {
            const div = document.getElementById('jogos-lista');
            div.innerHTML = '';
            jogos.forEach(j => {
                div.innerHTML += `
                    <div class="jogo-item">
                        <input type="text" id="t1_${j.id}" value="${j.time1}" placeholder="Time 1">
                        <span>VS</span>
                        <input type="text" id="t2_${j.id}" value="${j.time2}" placeholder="Time 2">
                        <input type="text" id="d_${j.id}" value="${j.data}" placeholder="Data" style="width:80px">
                        <button class="btn-danger" onclick="removerJogo(${j.id})">Remover</button>
                    </div>
                `;
            });
        }
        
        function adicionarJogo() {
            const novoId = jogos.length + 1;
            jogos.push({ id: novoId, time1: 'NOVO', time2: 'TIME', data: '00/00', gols1: null, gols2: null });
            mostrarJogos();
        }
        
        function removerJogo(id) {
            jogos = jogos.filter(j => j.id !== id);
            mostrarJogos();
        }
        
        // 🔥 FUNÇÃO CORRIGIDA PARA SALVAR JOGOS
        function salvarJogos() {
            console.log("🔵 Iniciando salvamento...");
            
            // Atualizar dados dos jogos
            jogos.forEach(jogo => {
                const time1 = document.getElementById(`t1_${jogo.id}`)?.value;
                const time2 = document.getElementById(`t2_${jogo.id}`)?.value;
                const data = document.getElementById(`d_${jogo.id}`)?.value;
                
                if (time1) jogo.time1 = time1;
                if (time2) jogo.time2 = time2;
                if (data) jogo.data = data;
                
                console.log(`📝 Jogo ${jogo.id}: ${jogo.time1} x ${jogo.time2} (${jogo.data})`);
            });
            
            // Salvar no Firebase
            db.ref('jogos').set(jogos)
                .then(() => {
                    console.log("✅ Jogos salvos com sucesso!");
                    alert('✅ Jogos salvos com sucesso!');
                })
                .catch((error) => {
                    console.error("❌ Erro ao salvar:", error);
                    alert('❌ Erro ao salvar jogos: ' + error.message);
                });
            
            // Salvar prazo
            const prazo = document.getElementById('prazo').value;
            db.ref('prazo').set(prazo)
                .then(() => console.log("✅ Prazo salvo:", prazo))
                .catch((error) => console.error("❌ Erro ao salvar prazo:", error));
        }
        
        // ========== RESULTADOS ==========
        function mostrarResultados() {
            const div = document.getElementById('resultados-lista');
            div.innerHTML = '';
            jogos.forEach(j => {
                div.innerHTML += `
                    <div class="jogo-item">
                        <strong>${j.time1} x ${j.time2}</strong>
                        <input type="number" id="r1_${j.id}" value="${j.gols1 !== null ? j.gols1 : ''}" placeholder="0" style="width:60px">
                        <span>x</span>
                        <input type="number" id="r2_${j.id}" value="${j.gols2 !== null ? j.gols2 : ''}" placeholder="0" style="width:60px">
                    </div>
                `;
            });
        }
        
        function salvarResultados() {
            jogos.forEach(j => {
                const g1 = document.getElementById(`r1_${j.id}`).value;
                const g2 = document.getElementById(`r2_${j.id}`).value;
                if (g1 !== '' && g2 !== '') {
                    j.gols1 = parseInt(g1);
                    j.gols2 = parseInt(g2);
                }
            });
            db.ref('jogos').set(jogos);
            alert('✅ Resultados salvos!');
        }
        
        // ========== PAGAMENTOS ==========
        function mostrarPagamentos() {
            const div = document.getElementById('pagamentos-lista');
            div.innerHTML = '';
            participantes.forEach(p => {
                div.innerHTML += `
                    <div class="jogo-item">
                        <span><strong>${p.nome}</strong> - ${p.celular}</span>
                        <button onclick="togglePago('${p.celular}')" style="background: ${p.pago ? '#e74c3c' : '#27ae60'}">
                            ${p.pago ? '❌ Cancelar' : '✅ Confirmar'}
                        </button>
                    </div>
                `;
            });
        }
        
        function togglePago(celular) {
            const p = participantes.find(p => p.celular === celular);
            if (p) {
                p.pago = !p.pago;
                db.ref('participantes').set(participantes);
            }
        }
        
        // ========== CONFIG ==========
        function salvarConfig() {
            const config = {
                placarExato: parseInt(document.getElementById('pontos-placar').value),
                resultadoCerto: parseInt(document.getElementById('pontos-resultado').value),
                valorAposta: parseFloat(document.getElementById('valor-aposta').value)
            };
            db.ref('config').update(config);
            
            const novaSenha = document.getElementById('nova-senha').value;
            if (novaSenha) {
                db.ref('config/senha').set(novaSenha);
                alert('✅ Configurações salvas! Nova senha definida.');
            } else {
                alert('✅ Configurações salvas!');
            }
        }
    </script>
</body>
</html>
