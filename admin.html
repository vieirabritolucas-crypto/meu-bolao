<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Meu Bolão</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .jogo {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .jogo input {
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            flex: 1;
        }
        .participante {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .resultado {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .resultado input { width: 60px; padding: 5px; }
        .tab {
            display: inline-block;
            padding: 10px 20px;
            background: #e0e0e0;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
        }
        .tab.ativo {
            background: #667eea;
            color: white;
        }
        .conteudo { display: none; }
        .conteudo.ativo { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Painel Admin</h1>
        
        <div class="tabs">
            <div class="tab ativo" onclick="mudarAba('jogos')">📅 Jogos</div>
            <div class="tab" onclick="mudarAba('resultados')">🎯 Resultados</div>
            <div class="tab" onclick="mudarAba('pagamentos')">💰 Pagamentos</div>
            <div class="tab" onclick="mudarAba('config')">⚙️ Config</div>
        </div>
        
        <div id="aba-jogos" class="conteudo ativo">
            <button onclick="adicionarJogo()">+ Adicionar Jogo</button>
            <button onclick="salvarJogos()">💾 Salvar</button>
            <div id="jogos-lista"></div>
            <label>Prazo:</label>
            <input type="datetime-local" id="prazo">
        </div>
        
        <div id="aba-resultados" class="conteudo">
            <div id="resultados-lista"></div>
            <button onclick="salvarResultados()">💾 Salvar Resultados</button>
        </div>
        
        <div id="aba-pagamentos" class="conteudo">
            <div id="pagamentos-lista"></div>
        </div>
        
        <div id="aba-config" class="conteudo">
            <label>Pontos placar exato:</label>
            <input type="number" id="pontos-placar" value="3">
            <label>Pontos resultado certo:</label>
            <input type="number" id="pontos-resultado" value="1">
            <label>Valor aposta (R$):</label>
            <input type="number" id="valor-aposta" value="10">
            <button onclick="salvarConfig()">💾 Salvar</button>
        </div>
        
        <p><a href="index.html" target="_blank">👥 Ver site</a></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNtc50Dxym-ZL9QW7q9V9yLrYezijq0ek",
            authDomain: "meu-bolao-7977f.firebaseapp.com",
            databaseURL: "https://meu-bolao-7977f-default-rtdb.firebaseio.com",
            projectId: "meu-bolao-7977f",
            storageBucket: "meu-bolao-7977f.firebasestorage.app",
            messagingSenderId: "766522730401",
            appId: "1:766522730401:web:c056a8dedc130e6a5b0de0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let jogos = [];
        let participantes = [];
        
        database.ref('jogos').on('value', (snapshot) => {
            const data = snapshot.val();
            jogos = data ? Object.values(data) : [];
            mostrarJogos();
            mostrarResultados();
        });
        
        database.ref('participantes').on('value', (snapshot) => {
            const data = snapshot.val();
            participantes = data ? Object.values(data) : [];
            mostrarPagamentos();
        });
        
        function mostrarJogos() {
            const div = document.getElementById('jogos-lista');
            div.innerHTML = '';
            jogos.forEach(j => {
                div.innerHTML += `
                    <div class="jogo">
                        <input type="text" id="t1_${j.id}" value="${j.time1}" placeholder="Time 1">
                        <span>VS</span>
                        <input type="text" id="t2_${j.id}" value="${j.time2}" placeholder="Time 2">
                        <input type="text" id="d_${j.id}" value="${j.data}" placeholder="Data" style="width: 80px;">
                        <button onclick="removerJogo(${j.id})">Remover</button>
                    </div>
                `;
            });
        }
        
        function adicionarJogo() {
            const novoId = jogos.length + 1;
            jogos.push({ id: novoId, time1: 'NOVO', time2: 'TIME', data: '00/00', gols1: null, gols2: null });
            database.ref('jogos').set(jogos);
        }
        
        function removerJogo(id) {
            jogos = jogos.filter(j => j.id !== id);
            database.ref('jogos').set(jogos);
        }
        
        function salvarJogos() {
            jogos.forEach(j => {
                j.time1 = document.getElementById(`t1_${j.id}`).value;
                j.time2 = document.getElementById(`t2_${j.id}`).value;
                j.data = document.getElementById(`d_${j.id}`).value;
            });
            database.ref('jogos').set(jogos);
            alert('✅ Salvo!');
        }
        
        function mostrarResultados() {
            const div = document.getElementById('resultados-lista');
            div.innerHTML = '';
            jogos.forEach(j => {
                div.innerHTML += `
                    <div class="resultado">
                        <strong>${j.time1} x ${j.time2}</strong>
                        <input type="number" id="r1_${j.id}" value="${j.gols1 !== null ? j.gols1 : ''}">
                        <span>x</span>
                        <input type="number" id="r2_${j.id}" value="${j.gols2 !== null ? j.gols2 : ''}">
                    </div>
                `;
            });
        }
        
        function salvarResultados() {
            jogos.forEach(j => {
                j.gols1 = parseInt(document.getElementById(`r1_${j.id}`).value) || null;
                j.gols2 = parseInt(document.getElementById(`r2_${j.id}`).value) || null;
            });
            database.ref('jogos').set(jogos);
            alert('✅ Resultados salvos!');
        }
        
        function mostrarPagamentos() {
            const div = document.getElementById('pagamentos-lista');
            div.innerHTML = '';
            participantes.forEach(p => {
                div.innerHTML += `
                    <div class="participante">
                        <span><strong>${p.nome}</strong> - ${p.celular}</span>
                        <button onclick="togglePago('${p.celular}')" style="background: ${p.pago ? '#e74c3c' : '#27ae60'}">
                            ${p.pago ? 'Cancelar' : 'Confirmar'}
                        </button>
                    </div>
                `;
            });
        }
        
        function togglePago(celular) {
            const p = participantes.find(p => p.celular === celular);
            if (p) {
                p.pago = !p.pago;
                database.ref('participantes').set(participantes);
            }
        }
        
        function salvarConfig() {
            alert('✅ Config salvas!');
        }
        
        function mudarAba(aba) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
            document.querySelectorAll('.conteudo').forEach(c => c.classList.remove('ativo'));
            event.target.classList.add('ativo');
            document.getElementById(`aba-${aba}`).classList.add('ativo');
        }
    </script>
</body>
</html>
