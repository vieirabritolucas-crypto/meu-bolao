<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meu Bolão</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #667eea; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 10px; padding: 20px; }
        .jogo { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #667eea; }
        input { width: 60px; padding: 5px; margin: 5px; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Meu Bolão</h1>
        
        <div id="login">
            <h2>Login</h2>
            <input type="text" id="nome" placeholder="Seu nome">
            <input type="text" id="celular" placeholder="WhatsApp">
            <button onclick="fazerLogin()">Entrar</button>
        </div>
        
        <div id="jogos" style="display: none;">
            <h2>Palpites</h2>
            <div id="lista-jogos"></div>
            <button onclick="salvarPalpites()">Salvar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNtc50Dxym-ZL9QW7q9V9yLrYezijq0ek",
            authDomain: "meu-bolao-7977f.firebaseapp.com",
            databaseURL: "https://meu-bolao-7977f-default-rtdb.firebaseio.com",
            projectId: "meu-bolao-7977f",
            storageBucket: "meu-bolao-7977f.firebasestorage.app",
            messagingSenderId: "766522730401",
            appId: "1:766522730401:web:c056a8dedc130e6a5b0de0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let jogos = [];
        let usuarioAtual = null;
        
        database.ref('jogos').on('value', (snapshot) => {
            const data = snapshot.val();
            jogos = data ? Object.values(data) : [];
            console.log('Jogos carregados:', jogos);
            if (usuarioAtual) mostrarJogos();
        });
        
        function fazerLogin() {
            const nome = document.getElementById('nome').value;
            const celular = document.getElementById('celular').value;
            if (!nome || !celular) return alert('Preencha tudo!');
            
            usuarioAtual = { nome, celular, palpites: [] };
            document.getElementById('login').style.display = 'none';
            document.getElementById('jogos').style.display = 'block';
            mostrarJogos();
        }
        
        function mostrarJogos() {
            const div = document.getElementById('lista-jogos');
            div.innerHTML = '';
            
            jogos.forEach((jogo, index) => {
                div.innerHTML += `
                    <div class="jogo">
                        <strong>${jogo.time1} x ${jogo.time2}</strong> (${jogo.data})
                        <br>
                        <input type="number" id="g1_${index}" placeholder="${jogo.time1}"> x 
                        <input type="number" id="g2_${index}" placeholder="${jogo.time2}">
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
        restaurarSessao();
    </script>
</body>
</html>
