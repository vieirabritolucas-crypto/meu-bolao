<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Meu Bolão</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 30px; 
            padding: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        h1 { 
            color: #333; 
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .tabs { 
            display: flex; 
            gap: 8px; 
            margin: 15px 0 20px; 
            flex-wrap: wrap; 
        }
        .tab { 
            padding: 10px 20px; 
            background: #f0f0f0; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
        }
        .tab.ativo { 
            background: #667eea; 
            color: white; 
        }
        
        .conteudo { display: none; }
        .conteudo.ativo { display: block; }
        
        .card { 
            background: #f8f9fa; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
        }
        
        .jogo-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin: 12px 0;
            border-left: 5px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .jogo-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 16px;
        }
        .resultado-final {
            background: #e8f4fd;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }
        .placar-container {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .time-placar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 40px;
            flex: 1;
        }
        .time-placar label {
            font-weight: 600;
            min-width: 70px;
            font-size: 14px;
        }
        .time-placar input {
            width: 65px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 30px;
            text-align: center;
            font-size: 14px;
        }
        .time-placar input:disabled {
            background: #f0f0f0;
            color: #999;
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        th { 
            background: #667eea; 
            color: white; 
            padding: 10px; 
            font-size: 14px;
        }
        td { 
            padding: 10px; 
            border-bottom: 1px solid #e0e0e0; 
            text-align: center; 
            font-size: 14px;
        }
        .primeiro { 
            background: linear-gradient(135deg, #f1c40f, #f39c12); 
            font-weight: bold; 
        }
        
        .ranking-destaque {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .vencedor-nome {
            font-size: 24px;
            font-weight: bold;
        }
        .vencedor-pontos {
            font-size: 32px;
            font-weight: bold;
        }
        
        .btn-primario { 
            padding: 12px 30px; 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            color: white; 
            border: none; 
            border-radius: 40px; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%;
            max-width: 250px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-sair {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-exportar {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
            font-size: 12px;
        }
        
        #login {
            max-width: 350px;
            margin: 30px auto;
            text-align: center;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 30px; 
            font-size: 14px;
        }
        
        .aviso {
            background: #f39c12;
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
        }
        
        .info-valor {
            background: #667eea;
            color: white;
            padding: 8px;
            border-radius: 30px;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .tabela-palpites {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .tabela-palpites th, .tabela-palpites td {
            padding: 6px;
            border: 1px solid #ddd;
        }
        .tabela-palpites th { background: #667eea; color: white; }
        
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .time-placar { flex-direction: column; text-align: center; }
            .time-placar label { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            ⚽ Meu Bolão
            <button onclick="logout()" class="btn-sair" id="btnSair" style="display: none;">Sair</button>
        </h1>
        
        <!-- LOGIN -->
        <div id="login">
            <h2>Entrar no Bolão</h2>
            <input type="text" id="nome" placeholder="Seu nome">
            <input type="text" id="celular" placeholder="WhatsApp">
            <button class="btn-primario" onclick="fazerLogin()">Entrar</button>
            <div id="info-valor" class="info-valor">💰 Carregando...</div>
        </div>
        
        <!-- PAINEL PRINCIPAL -->
        <div id="painel" style="display: none;">
            <div class="tabs">
                <div class="tab ativo" onclick="mudarAba('palpites')">📊 Palpites</div>
                <div class="tab" onclick="mudarAba('ranking')">🏆 Ranking</div>
                <div class="tab" onclick="mudarAba('grupo')">👥 Palpites Grupo</div>
                <div class="tab" onclick="mudarAba('exportar')">📥 Exportar</div>
            </div>
            
            <!-- ABA PALPITES -->
            <div id="aba-palpites" class="conteudo ativo">
                <div class="card">
                    <h2>📊 Meus Palpites</h2>
                    <div id="prazo-info" class="aviso" style="background: #e8f4fd; color:#333;"></div>
                    <div id="jogos-container">Carregando jogos...</div>
                    <button class="btn-primario" onclick="salvarPalpites()">💾 Salvar Palpites</button>
                </div>
            </div>
            
            <!-- ABA RANKING -->
            <div id="aba-ranking" class="conteudo">
                <div class="card">
                    <h2>🏆 Ranking</h2>
                    <div class="ranking-destaque" id="destaque-lider">
                        <h3>🎯 LÍDER</h3>
                        <div class="vencedor-nome" id="lider-nome">-</div>
                        <div class="vencedor-pontos" id="lider-pontos">0</div>
                        <div id="lider-premio">💰 Prêmio: R$ 0,00</div>
                    </div>
                     <table>
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Nome</th>
                                <th>3pts</th>
                                <th>1pt</th>
                                <th>Total</th>
                             '</thead>
                        <tbody id="ranking-body"></tbody>
                    </table>
                </div>
            </div>
            
            <!-- ABA PALPITES DO GRUPO -->
            <div id="aba-grupo" class="conteudo">
                <div class="card">
                    <h2>👥 Palpites do Grupo</h2>
                    <div id="prazo-aviso" class="aviso">🔒 Palpites visíveis após o prazo</div>
                    <div id="palpites-grupo-container"></div>
                </div>
            </div>
            
            <!-- ABA EXPORTAR -->
            <div id="aba-exportar" class="conteudo">
                <div class="card">
                    <h2>📥 Exportar Apostas</h2>
                    <button onclick="exportarCSV()" class="btn-exportar">📊 CSV (Excel)</button>
                    <button onclick="exportarTXT()" class="btn-exportar">📝 TXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURAÇÃO FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDNtc50Dxym-ZL9QW7q9V9yLrYezijq0ek",
            authDomain: "meu-bolao-7977f.firebaseapp.com",
            databaseURL: "https://meu-bolao-7977f-default-rtdb.firebaseio.com",
            projectId: "meu-bolao-7977f",
            storageBucket: "meu-bolao-7977f.firebasestorage.app",
            messagingSenderId: "766522730401",
            appId: "1:766522730401:web:c056a8dedc130e6a5b0de0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let usuarioAtual = null;
        let todosJogos = [];
        let todosParticipantes = [];
        let prazoFinal = null;
        let config = { valorAposta: 10, percentualPremio: 80 };
        
        // ========== CARREGAR DADOS ==========
        db.ref('jogos').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                todosJogos = Object.values(data);
                console.log('Jogos carregados:', todosJogos);
            } else {
                todosJogos = [];
            }
            if (usuarioAtual) {
                mostrarJogos();
                mostrarPalpitesGrupo();
                atualizarRanking();
            }
        });
        
        db.ref('participantes').on('value', (snap) => {
            const data = snap.val();
            todosParticipantes = data ? Object.values(data) : [];
            if (usuarioAtual) {
                usuarioAtual = todosParticipantes.find(p => p && p.celular === usuarioAtual.celular);
                atualizarRanking();
                mostrarPalpitesGrupo();
            }
        });
        
        db.ref('prazo').on('value', (snap) => {
            prazoFinal = snap.val();
            if (usuarioAtual) {
                mostrarJogos();
                mostrarPalpitesGrupo();
            }
        });
        
        db.ref('config').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                config.valorAposta = data.valorAposta || 10;
                config.percentualPremio = data.percentualPremio || 80;
            }
            document.getElementById('info-valor').innerHTML = `💰 Aposta: R$ ${config.valorAposta} | 1º lugar: ${config.percentualPremio}%`;
        });
        
        // ========== LOGIN ==========
        function fazerLogin() {
            const nome = document.getElementById('nome').value.trim();
            const celular = document.getElementById('celular').value.trim();
            
            if (!nome || !celular) {
                alert('Preencha nome e celular!');
                return;
            }
            
            let participante = todosParticipantes.find(p => p && p.celular === celular);
            
            if (!participante) {
                participante = { 
                    nome: nome, 
                    celular: celular, 
                    palpites: [], 
                    pago: false 
                };
                db.ref('participantes').push(participante);
            }
            
            usuarioAtual = participante;
            localStorage.setItem('userCelular', celular);
            
            document.getElementById('login').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
            document.getElementById('btnSair').style.display = 'inline-block';
            
            mostrarJogos();
            atualizarRanking();
            mostrarPalpitesGrupo();
        }
        
        function logout() {
            localStorage.removeItem('userCelular');
            usuarioAtual = null;
            document.getElementById('login').style.display = 'block';
            document.getElementById('painel').style.display = 'none';
            document.getElementById('btnSair').style.display = 'none';
        }
        
        function restaurarSessao() {
            const celular = localStorage.getItem('userCelular');
            if (celular) {
                usuarioAtual = todosParticipantes.find(p => p && p.celular === celular);
                if (usuarioAtual) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('painel').style.display = 'block';
                    document.getElementById('btnSair').style.display = 'inline-block';
                    mostrarJogos();
                    atualizarRanking();
                    mostrarPalpitesGrupo();
                }
            }
        }
        
        // ========== FUNÇÕES DE PRAZO ==========
        function prazoExpirado() {
            return prazoFinal ? new Date() > new Date(prazoFinal) : false;
        }
        
        // ========== MOSTRAR JOGOS (COM RESULTADOS CORRETOS) ==========
        function mostrarJogos() {
            const container = document.getElementById('jogos-container');
            if (!container) return;
            
            if (!todosJogos || todosJogos.length === 0) {
                container.innerHTML = '<p>Nenhum jogo cadastrado</p>';
                return;
            }
            
            const expirado = prazoExpirado();
            const dataPrazo = prazoFinal ? new Date(prazoFinal).toLocaleString('pt-BR') : 'Não definido';
            document.getElementById('prazo-info').innerHTML = `⏰ Prazo: ${dataPrazo} ${expirado ? '<span style="color:red;">(ENCERRADO)</span>' : ''}`;
            
            container.innerHTML = '';
            
            todosJogos.sort((a, b) => (a.id || 0) - (b.id || 0)).forEach(jogo => {
                if (!jogo || !jogo.time1) return;
                
                const palpite = usuarioAtual.palpites?.find(p => p && p.jogoId === jogo.id);
                
                // VERIFICAÇÃO CORRETA DO RESULTADO
                const temResultado = jogo.gols1 !== null && jogo.gols1 !== undefined && 
                                    jogo.gols2 !== null && jogo.gols2 !== undefined;
                
                let resultadoHTML = '';
                if (temResultado) {
                    resultadoHTML = `
                        <div class="resultado-final">
                            🏁 RESULTADO: ${jogo.time1} ${jogo.gols1} x ${jogo.gols2} ${jogo.time2}
                        </div>
                    `;
                }
                
                // Campos ficam desabilitados se o jogo já tem resultado OU prazo expirou
                const disabled = (temResultado || expirado) ? 'disabled' : '';
                
                container.innerHTML += `
                    <div class="jogo-card" data-jogo-id="${jogo.id}">
                        <div class="jogo-header">
                            <span>⚽ ${jogo.time1} x ${jogo.time2}</span>
                            <span>${jogo.data || '--/--'}</span>
                        </div>
                        ${resultadoHTML}
                        <div class="placar-container">
                            <div class="time-placar">
                                <label>${jogo.time1}:</label>
                                <input type="number" class="gols1" value="${palpite?.gols1 !== undefined ? palpite.gols1 : ''}" min="0" max="10" ${disabled}>
                            </div>
                            <div class="time-placar">
                                <label>${jogo.time2}:</label>
                                <input type="number" class="gols2" value="${palpite?.gols2 !== undefined ? palpite.gols2 : ''}" min="0" max="10" ${disabled}>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        // ========== SALVAR PALPITES ==========
        function salvarPalpites() {
            if (prazoExpirado()) {
                alert('❌ Prazo encerrado! Não é mais possível salvar.');
                return;
            }
            
            const palpites = [];
            let todosPreenchidos = true;
            
            document.querySelectorAll('.jogo-card').forEach(div => {
                const jogoId = parseInt(div.dataset.jogoId);
                const gols1 = div.querySelector('.gols1').value;
                const gols2 = div.querySelector('.gols2').value;
                const input1 = div.querySelector('.gols1');
                
                // Só verifica se o campo não está disabled
                if (!input1.disabled) {
                    if (gols1 === '' || gols2 === '') {
                        todosPreenchidos = false;
                        return;
                    }
                    palpites.push({ jogoId, gols1: parseInt(gols1), gols2: parseInt(gols2) });
                } else {
                    // Para jogos com resultado, mantém o palpite antigo
                    const palpiteAntigo = usuarioAtual.palpites?.find(p => p && p.jogoId === jogoId);
                    if (palpiteAntigo) {
                        palpites.push(palpiteAntigo);
                    }
                }
            });
            
            if (!todosPreenchidos) {
                alert('❌ Preencha todos os jogos que ainda não tem resultado!');
                return;
            }
            
            usuarioAtual.palpites = palpites;
            
            db.ref('participantes').once('value', (snap) => {
                const data = snap.val();
                if (data) {
                    for (let key in data) {
                        if (data[key].celular === usuarioAtual.celular) {
                            db.ref('participantes/' + key).set(usuarioAtual)
                                .then(() => alert('✅ Palpites salvos!'));
                            break;
                        }
                    }
                }
            });
        }
        
        // ========== CÁLCULO DE PONTOS ==========
        function calcularPontos(participante) {
            if (!participante || !participante.palpites) return { total: 0, p3: 0, p1: 0 };
            
            let total = 0, p3 = 0, p1 = 0;
            
            participante.palpites.forEach(palpite => {
                if (!palpite) return;
                const jogo = todosJogos.find(j => j && j.id === palpite.jogoId);
                if (jogo && jogo.gols1 != null && jogo.gols2 != null) {
                    if (palpite.gols1 === jogo.gols1 && palpite.gols2 === jogo.gols2) {
                        total += 3;
                        p3++;
                    } else {
                        const resJogo = jogo.gols1 > jogo.gols2 ? 1 : jogo.gols2 > jogo.gols1 ? 2 : 0;
                        const resPalpite = palpite.gols1 > palpite.gols2 ? 1 : palpite.gols2 > palpite.gols1 ? 2 : 0;
                        if (resJogo === resPalpite) {
                            total += 1;
                            p1++;
                        }
                    }
                }
            });
            
            return { total, p3, p1 };
        }
        
        // ========== RANKING ==========
        function atualizarRanking() {
            const pagantes = todosParticipantes.filter(p => p && p.pago === true);
            const ranking = pagantes.map(p => ({
                nome: p.nome,
                ...calcularPontos(p)
            })).sort((a, b) => b.total - a.total);
            
            if (ranking.length > 0) {
                const lider = ranking[0];
                const totalArrecadado = pagantes.length * config.valorAposta;
                const premio = totalArrecadado * (config.percentualPremio / 100);
                
                document.getElementById('lider-nome').textContent = lider.nome;
                document.getElementById('lider-pontos').textContent = lider.total;
                document.getElementById('lider-premio').innerHTML = `💰 Prêmio: R$ ${premio.toFixed(2)}`;
            }
            
            const tbody = document.getElementById('ranking-body');
            if (ranking.length === 0) {
                tbody.innerHTML = '}<tr><td colspan="5">Nenhum participante pagante</td></tr>';
            } else {
                tbody.innerHTML = ranking.map((p, i) => `
                    <tr ${i === 0 ? 'class="primeiro"' : ''}>
                        <td>${i+1}º</td>
                        <td>${p.nome}</td>
                        <td>${p.p3}</td>
                        <td>${p.p1}</td>
                        <td><strong>${p.total}</strong></td>
                    </tr>
                `).join('');
            }
        }
        
        // ========== PALPITES DO GRUPO ==========
        function mostrarPalpitesGrupo() {
            const container = document.getElementById('palpites-grupo-container');
            if (!container) return;
            
            if (!prazoExpirado()) {
                document.getElementById('prazo-aviso').style.display = 'block';
                container.innerHTML = '';
                return;
            }
            
            document.getElementById('prazo-aviso').style.display = 'none';
            
            const pagantes = todosParticipantes.filter(p => p && p.pago === true);
            if (pagantes.length === 0) {
                container.innerHTML = '<p>Nenhum participante pagante.</p>';
                return;
            }
            
            const jogosOrdenados = [...todosJogos].sort((a, b) => (a.id || 0) - (b.id || 0));
            
            let html = '<table class="tabela-palpites"><tr><th>Participante</th>';
            jogosOrdenados.forEach(j => {
                html += `<th>${j.time1}<br>x<br>${j.time2}</th>`;
            });
            html += '</tr>';
            
            pagantes.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(p => {
                html += `<tr><td><strong>${p.nome}</strong></td>`;
                jogosOrdenados.forEach(j => {
                    const palpite = p.palpites?.find(pp => pp && pp.jogoId === j.id);
                    html += `<td>${palpite ? `${palpite.gols1} x ${palpite.gols2}` : '---'}</td>`;
                });
                html += '</tr>';
            });
            html += '</table>';
            
            container.innerHTML = html;
        }
        
        // ========== EXPORTAR ==========
        function exportarCSV() {
            if (!prazoExpirado()) {
                alert('Aguarde o prazo encerrar para exportar.');
                return;
            }
            
            const pagantes = todosParticipantes.filter(p => p && p.pago === true);
            if (pagantes.length === 0) {
                alert('Nenhum participante pagante.');
                return;
            }
            
            const jogosOrdenados = [...todosJogos].sort((a, b) => (a.id || 0) - (b.id || 0));
            
            let csv = 'Participante';
            jogosOrdenados.forEach(j => {
                csv += `,${j.time1} x ${j.time2}`;
            });
            csv += '\n';
            
            pagantes.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(p => {
                csv += p.nome;
                jogosOrdenados.forEach(j => {
                    const palpite = p.palpites?.find(pp => pp && pp.jogoId === j.id);
                    csv += `,${palpite ? `${palpite.gols1}-${palpite.gols2}` : '---'}`;
                });
                csv += '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `apostas_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }
        
        function exportarTXT() {
            if (!prazoExpirado()) {
                alert('Aguarde o prazo encerrar para exportar.');
                return;
            }
            
            const pagantes = todosParticipantes.filter(p => p && p.pago === true);
            if (pagantes.length === 0) {
                alert('Nenhum participante pagante.');
                return;
            }
            
            const jogosOrdenados = [...todosJogos].sort((a, b) => (a.id || 0) - (b.id || 0));
            
            let txt = `RELATÓRIO DE APOSTAS\n`;
            txt += `Data: ${new Date().toLocaleString()}\n`;
            txt += `Pagantes: ${pagantes.length}\n`;
            txt += `='='='='='='='='='='='='='='='='='='\n\n`;
            
            jogosOrdenados.forEach(j => {
                txt += `${j.time1} x ${j.time2}\n`;
                txt += `='='='='='='='='='='='='='\n`;
                pagantes.sort((a, b) => a.nome.localeCompare(b.nome)).forEach(p => {
                    const palpite = p.palpites?.find(pp => pp && pp.jogoId === j.id);
                    if (palpite) {
                        txt += `${p.nome}: ${palpite.gols1} x ${palpite.gols2}\n`;
                    }
                });
                txt += '\n';
            });
            
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `apostas_${new Date().toLocaleDateString()}.txt`;
            a.click();
        }
        
        // ========== MUDAR ABA ==========
        function mudarAba(aba) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
            document.querySelectorAll('.conteudo').forEach(c => c.classList.remove('ativo'));
            event.target.classList.add('ativo');
            document.getElementById(`aba-${aba}`).classList.add('ativo');
            
            if (aba === 'ranking') atualizarRanking();
            if (aba === 'grupo') mostrarPalpitesGrupo();
        }
        
        // ========== INICIALIZAR ==========
        restaurarSessao();
    </script>
</body>
</html>
